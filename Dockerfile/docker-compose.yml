version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5164:5164"
    environment:
      - ConnectionStrings__NorthwindConnection=Server=db;Database=Northwind;User Id=sa;Password=YourPassword123!;TrustServerCertificate=True;
    depends_on:
      - db

  frontend:
    build:
      context: ./northwind-frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "9000:80"
    depends_on:
      - api

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "YourPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"